<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portify — Markdown Portfolio Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --surface2:  #1a1e25;
      --border:    #252a34;
      --accent:    #c8f04e;
      --accent2:   #4ef0c8;
      --text:      #e8eaf0;
      --text-muted:#6b7280;
      --danger:    #f04e6b;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --bar-h:     52px;
      --divider-w: 5px;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }
 
    /* ── TOP BAR ── */
    #topbar {
      height: var(--bar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: relative;
      z-index: 100;
    }
 
    #logo {
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
 
    #logo span {
      display: inline-block;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 4px;
      position: relative;
    }
 
    #logo span::after {
      content: '';
      position: absolute;
      inset: 4px 4px 4px 7px;
      border-left: 2px solid var(--bg);
      border-bottom: 2px solid var(--bg);
    }
 
    .spacer { flex: 1; }
 
    .topbar-meta {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
 
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
 
    /* ── WORKSPACE ── */
    #workspace {
      display: flex;
      height: calc(100vh - var(--bar-h));
      overflow: hidden;
    }
 
    /* ── EDITOR PANE ── */
    #editor-pane {
      display: flex;
      flex-direction: column;
      width: 50%;
      min-width: 200px;
      background: var(--surface);
      overflow: hidden;
    }
 
    .pane-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }
 
    .pane-label {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
 
    .pane-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
 
    .pane-dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
 
    /* line numbers + editor container */
    #editor-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.83rem;
      line-height: 1.75;
    }
 
    #line-numbers {
      white-space: pre;
      overflow-y: hidden;
      display: block;
      width: 44px;
      padding: 14px 0;
      text-align: right;
      color: var(--text-muted);
      font-size: 0.72rem;
      line-height: 1.75;
      user-select: none;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding-right: 10px;
    }
 
    #editor {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.83rem;
      line-height: 1.75;
      padding: 14px 18px;
      caret-color: var(--accent);
      tab-size: 2;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
    }
 
    #editor::selection {
      background: rgba(200, 240, 78, 0.18);
    }
 
    #editor::-webkit-scrollbar { width: 6px; height: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
 
    /* ── DIVIDER ── */
    #divider {
      width: var(--divider-w);
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    #divider:hover, #divider.dragging {
      background: var(--accent);
    }
 
    #divider::before {
      content: '⋮';
      color: var(--bg);
      font-size: 0.85rem;
      line-height: 1;
      letter-spacing: -1px;
      pointer-events: none;
    }
 
    /* ── PREVIEW PANE ── */
    #preview-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      overflow: hidden;
    }
 
    #preview-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }
 
    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
 
    #btn-server {
      background: rgba(78, 240, 200, 0.10);
      color: var(--accent2);
      border-color: rgba(78, 240, 200, 0.25);
    }
 
    #btn-server:hover {
      background: rgba(78, 240, 200, 0.20);
      border-color: var(--accent2);
      box-shadow: 0 0 12px rgba(78, 240, 200, 0.2);
    }
 
    #btn-server:active { transform: scale(0.97); }
 
    .btn-icon {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
 
    #preview-header .spacer { flex: 1; }

        /* ── BUTTON VARIANTS ── */
    .btn-primary {
      background: rgba(200, 240, 78, 0.10);
      color: var(--accent);
      border-color: rgba(200, 240, 78, 0.25);
    }
  
    .btn-primary:hover {
      background: rgba(200, 240, 78, 0.20);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(200, 240, 78, 0.2);
    }
  
    .btn-secondary {
      background: rgba(78, 240, 200, 0.10);
      color: var(--accent2);
      border-color: rgba(78, 240, 200, 0.25);
    }
  
    .btn-secondary:hover {
      background: rgba(78, 240, 200, 0.20);
      border-color: var(--accent2);
      box-shadow: 0 0 12px rgba(78, 240, 200, 0.2);
    }
 
    /* ── PREVIEW IFRAME ── */
    #preview-iframe {
      flex: 1;
      border: none;
      background: var(--surface2);
    }
 
    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 8px 18px;
      border-radius: 6px;
      transition: transform 0.25s cubic-bezier(.16,1,.3,1);
      z-index: 999;
      pointer-events: none;
    }
 
    #toast.show { transform: translateX(-50%) translateY(0); }
 
    /* ── WORD COUNT ── */
    #wordcount {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-left: auto;
      padding-right: 4px;
    }
  </style>
</head>
<body>
 
<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">
    <span></span>
    Portify
  </div>
  <div class="topbar-meta">Markdown Portfolio Editor</div>
  <div class="spacer"></div>
  <div class="topbar-meta"><span class="status-dot"></span>Ready</div>
</div>
 
<!-- WORKSPACE -->
<div id="workspace">
 
  <!-- EDITOR PANE -->
  <div id="editor-pane">
    <div class="pane-header">
      <div class="pane-dot active"></div>
      <span class="pane-label">Editor</span>
      <span id="wordcount">0 words</span>
    </div>
    <div id="editor-body">
      <div id="line-numbers"></div>
      <textarea id="editor" spellcheck="false" placeholder="# Start writing your portfolio..."></textarea>
    </div>
  </div>
 
  <!-- RESIZE DIVIDER -->
  <div id="divider"></div>
 
  <!-- PREVIEW PANE -->
  <div id="preview-pane">
    <div id="preview-header">
      <div class="pane-dot"></div>
      <span class="pane-label">Preview</span>
      <div class="spacer"></div>
 
      <!-- SERVER BUTTONS -->
      <button class="btn btn-primary" id="btn-run" title="Run and Preview">
        <span class="btn-icon">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2v10l10-5-10-5z" fill="currentColor"/>
          </svg>
        </span>
        Run
      </button>
      <button class="btn btn-secondary" id="btn-generate" title="Generate Portfolio">
        <span class="btn-icon">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="12" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="1" y="8" width="12" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="11.5" cy="3.5" r="1" fill="currentColor"/>
            <circle cx="11.5" cy="10.5" r="1" fill="currentColor"/>
          </svg>
        </span>
        Generate
      </button>
    </div>
 
    <iframe id="preview-iframe"></iframe>
  </div>
</div>
 
<!-- TOAST -->
<div id="toast"></div>
 
<script>
window.addEventListener('DOMContentLoaded', () => {
  // ─── ELEMENTS ───────────────────────────────
  const editor       = document.getElementById('editor');
  const lineNumbers  = document.getElementById('line-numbers');
  const wordcountEl  = document.getElementById('wordcount');
  const divider      = document.getElementById('divider');
  const editorPane   = document.getElementById('editor-pane');
  const workspace    = document.getElementById('workspace');
  const btnServer    = document.getElementById('btn-server');
  const previewIframe = document.getElementById('preview-iframe');
  const previewDot   = document.querySelector('#preview-pane .pane-dot');
  const toast        = document.getElementById('toast');
 
  // ─── DEFAULT CONTENT ────────────────────────
  const defaultMD = `<!-- 
    Instructions:
    - Edit the text in just the square brackets.
    - For links, paste the url in the round brackets.
    - To add more projects, just copy paste the 5 lines.
 -->

# PROFILE

Name: [Your Full Name]<br>
Title: [Your Professional Title, e.g., Software Engineer]<br>
Bio: [Write a short introduction about yourself, your background, and your goals.]<br>

> "[Insert a personal quote, philosophy, or objective statement. By Mr Socrates...]"

# SKILLS
* Languages: [List your programming languages, e.g., C++, Java, Python]
* Tools: [List your tools, e.g., Git, VS Code, Linux]
* Concepts: [List key concepts, e.g., OOP, Data Structures, Web Development]

# PROJECTS

## [Project Title 1]
Title: [Title of your project.]<br>
Description: [Brief description of what the project does and your role in it.]<br>
Tech: [Languages, tools, or concepts used, e.g., C++, OOP]<br>
Link: [View Source Code](paste_actual_link_in_these_brackets)

## [Project Title 2]
Title: [Title of your project.]<br>
Description: [Brief description of what the project does and your role in it.]<br>
Tech: [Languages, tools, or concepts used, e.g., C++, OOP]<br>
Link: [View Source Code](paste_actual_link_in_these_brackets)

# CONTACT
Email: [your.email@example.com](mailto:your.email@example.com)<br>
GitHub: [github.com/yourusername](https://github.com/yourusername)<br>
LinkedIn: [linkedin.com/in/yourusername](https://linkedin.com/in/yourusername)

`;
 
  // ─── INIT ───────────────────────────────────
  editor.value = defaultMD;
  updateLineNumbers();
  updateWordCount();
 
  // ─── LINE NUMBERS ────────────────────────────
  function updateLineNumbers() {
    const lines = editor.value.split('\n').length;
    lineNumbers.innerText = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
    lineNumbers.scrollTop = editor.scrollTop;
  }

  editor.addEventListener('input', () => {
    updateLineNumbers();
    updateWordCount();
    // Optional: mark preview as outdated
    previewDot.classList.remove('active');
  });

  editor.addEventListener('scroll', () => {
    lineNumbers.scrollTop = editor.scrollTop;
  });

  // ─── WORD COUNT ─────────────────────────────
  function updateWordCount() {
    const words = editor.value.trim().split(/\s+/).filter(Boolean).length;
    wordcountEl.textContent = words + ' word' + (words !== 1 ? 's' : '');
  }

  // ─── TAB KEY SUPPORT ────────────────────────
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
      updateLineNumbers();
    }
  });
 
  // // ─── GENERATE BUTTON ─────────────────────────
  // btnServer.addEventListener('click', () => {
  //   const markdown = editor.value;
    
  //   showToast('Generating...', 2000);
    
  //   fetch('http://localhost:8000/generate', {
  //     method: 'POST',
  //     headers: { 'Content-Type': 'application/json' },
  //     body: JSON.stringify({ markdown })
  //   })
  //   .then(response => {
  //     if (!response.ok) throw new Error('Server returned ' + response.status);
  //     return response.json();
  //   })
  //   .then(data => {
  //     if (data.status === 'success') {
  //       showToast('✓ Portfolio generated!', 2000);
  //       // Add timestamp to bypass cache
  //       const timestamp = new Date().getTime();
  //       previewIframe.src = `http://localhost:8000/output/index.html?t=${timestamp}`;
  //     } else {
  //       showToast('✗ ' + (data.message || 'Generation failed'), 2000);
  //     }
  //   })
  //   .catch(err => {
  //     showToast('✗ Cannot reach server — is server.py running?', 2000);
  //     console.error('Fetch error:', err);
  //   });
  // });

    // ─── RUN BUTTON ──────────────────────────────
  const btnRun = document.getElementById('btn-run');
  const btnGenerate = document.getElementById('btn-generate');
  
  btnRun.addEventListener('click', () => {
    const markdown = editor.value;
    
    showToast('Running...', 2000);
    
    fetch('http://localhost:8000/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showToast('✓ Preview updated', 2000);
        previewDot.classList.add('active'); // mark as current
        const timestamp = new Date().getTime();
        previewIframe.src = `http://localhost:8000/output/index.html?t=${timestamp}`;
      } else {
        showToast('✗ ' + (data.message || 'Run failed'), 2000);
      }
    })
    .catch(err => {
      showToast('✗ Cannot reach server — is server.py running?', 2000);
      console.error('Fetch error:', err);
    });
  });
  
  // ─── GENERATE BUTTON ─────────────────────────
  btnGenerate.addEventListener('click', () => {
    const markdown = editor.value;
    
    showToast('Generating...', 2000);
    
    fetch('http://localhost:8000/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showToast('✓ Opening in new tab...', 2000);
        // Open in new tab with cache-busting timestamp
        const timestamp = new Date().getTime();
        window.open(`http://localhost:8000/output/index.html?t=${timestamp}`, '_blank');
      } else {
        showToast('✗ ' + (data.message || 'Generation failed'), 2000);
      }
    })
    .catch(err => {
      showToast('✗ Cannot reach server — is server.py running?', 2000);
      console.error('Fetch error:', err);
    });
  });
 
  // ─── TOAST ───────────────────────────────────
  let toastTimer;
  function showToast(msg, duration = 2000) {
    clearTimeout(toastTimer);
    
    toast.textContent = msg;
    toast.classList.add('show');
    
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, duration);
  }
 
  // ─── DIVIDER DRAG ────────────────────────────
  let dragging = false;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    
    // Prevent the iframe from swallowing mouse events
    previewIframe.style.pointerEvents = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const wsRect = workspace.getBoundingClientRect();
    const newEditorW = Math.max(200, Math.min(wsRect.width - 200, e.clientX - wsRect.left));
    editorPane.style.width = newEditorW + 'px';
    editorPane.style.flex = 'none';
  });

  document.addEventListener('mouseup', e => {
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    
    // Restore iframe interaction
    previewIframe.style.pointerEvents = '';
  });
});
</script>
</body>
</html>
