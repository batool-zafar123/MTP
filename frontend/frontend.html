<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portify — Markdown Portfolio Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('portify-theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --surface2:  #1a1e25;
      --border:    #252a34;
      --accent:    #c8f04e;
      --accent2:   #4ef0c8;
      --text:      #e8eaf0;
      --text-muted:#6b7280;
      --danger:    #f04e6b;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --bar-h:     56px;
      --divider-w: 5px;
    }

    body.light-theme {
      --bg:          #f4f6f9;
      --surface:     #ffffff;
      --surface2:    #eaeef3;
      --border:      #d1d5db;
      --accent:      #4f46e5;
      --accent2:     #0d9488;
      --text:        #111827;
      --text-muted:  #4b5563;
      --danger:      #e11d48;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }
 
    /* ── TOP BAR ── */
    #topbar {
      height: var(--bar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: relative;
      z-index: 100;
    }
 
    #logo {
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
 
    #logo span {
      display: inline-block;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 4px;
      position: relative;
    }
 
    #logo span::after {
      content: '';
      position: absolute;
      inset: 4px 4px 4px 7px;
      border-left: 2px solid var(--bg);
      border-bottom: 2px solid var(--bg);
    }
 
    .spacer { flex: 1; }
   
    .topbar-nav {
      display: flex;
      gap: 8px;
      margin-left: 30px;
    }

    .nav-btn {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 4px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .nav-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-btn.active {
      color: var(--accent);
      background: rgba(200, 240, 78, 0.08);
      border-color: rgba(200, 240, 78, 0.15);
    }

    body.light-theme .nav-btn.active {
      background: rgba(79, 70, 229, 0.08);
      border-color: rgba(79, 70, 229, 0.15);
    }

    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      margin-left: 10px;
    }

    .theme-toggle-btn:hover {
      background: var(--surface2);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    body.light-theme .theme-toggle-btn {
      background: #eaeef3;
      color: #111827;
    }

    #btn-copy-code {
      margin-right: 8px;
    }

    /* ── CODE PREVIEW MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 1000;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 {
      font-family: var(--font-ui);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close-btn:hover {
      color: var(--danger);
    }

    .modal-body {
      flex: 1;
      padding: 20px;
      overflow: hidden;
      display: flex;
    }

    #modal-code-area {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 300px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent2);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      overflow-y: auto;
    }

    body.light-theme #modal-code-area {
      color: #0d9488;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .topbar-meta {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
 
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
 
    /* ── WORKSPACE ── */
    #workspace {
      display: flex;
      height: calc(100vh - var(--bar-h));
      overflow: hidden;
    }
 
    /* ── EDITOR PANE ── */
    #editor-pane {
      display: flex;
      flex-direction: column;
      width: 50%;
      min-width: 200px;
      background: var(--surface);
      overflow: hidden;
    }
 
    .pane-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }
 
    .pane-label {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
 
    .pane-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
 
    .pane-dot.active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
 
    /* line numbers + editor container */
    #editor-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.83rem;
      line-height: 1.75;
    }
 
    #line-numbers {
      white-space: pre;
      overflow-y: hidden;
      display: block;
      width: 44px;
      padding: 14px 0;
      text-align: right;
      color: var(--text-muted);
      font-size: 0.72rem;
      line-height: 1.75;
      user-select: none;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding-right: 10px;
    }
 
    #editor {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.83rem;
      line-height: 1.75;
      padding: 14px 18px;
      caret-color: var(--accent);
      tab-size: 2;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
    }
 
    #editor::selection {
      background: rgba(200, 240, 78, 0.18);
    }
 
    #editor::-webkit-scrollbar { width: 6px; height: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
 
    /* ── DIVIDER ── */
    #divider {
      width: var(--divider-w);
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    #divider:hover, #divider.dragging {
      background: var(--accent);
    }
 
    #divider::before {
      content: '⋮';
      color: var(--bg);
      font-size: 0.85rem;
      line-height: 1;
      letter-spacing: -1px;
      pointer-events: none;
    }
 
    /* ── PREVIEW PANE ── */
    #preview-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      overflow: hidden;
    }
 
    #preview-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }
 
    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
 
    #btn-server {
      background: rgba(78, 240, 200, 0.10);
      color: var(--accent2);
      border-color: rgba(78, 240, 200, 0.25);
    }
 
    #btn-server:hover {
      background: rgba(78, 240, 200, 0.20);
      border-color: var(--accent2);
      box-shadow: 0 0 12px rgba(78, 240, 200, 0.2);
    }
 
    #btn-server:active { transform: scale(0.97); }
 
    .btn-icon {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
 
    #preview-header .spacer { flex: 1; }
 
    /* ── BUTTON VARIANTS ── */
    .btn-primary {
      background: rgba(200, 240, 78, 0.10);
      color: var(--accent);
      border-color: rgba(200, 240, 78, 0.25);
    }
  
    .btn-primary:hover {
      background: rgba(200, 240, 78, 0.20);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(200, 240, 78, 0.2);
    }
  
    .btn-secondary {
      background: rgba(78, 240, 200, 0.10);
      color: var(--accent2);
      border-color: rgba(78, 240, 200, 0.25);
    }
  
    .btn-secondary:hover {
      background: rgba(78, 240, 200, 0.20);
      border-color: var(--accent2);
      box-shadow: 0 0 12px rgba(78, 240, 200, 0.2);
    }
 
    /* ── PREVIEW IFRAME ── */
    #preview-iframe {
      flex: 1;
      border: none;
      background: var(--surface2);
    }
 
    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 8px 18px;
      border-radius: 6px;
      transition: transform 0.25s cubic-bezier(.16,1,.3,1);
      z-index: 999;
      pointer-events: none;
    }
 
    #toast.show { transform: translateX(-50%) translateY(0); }
 
    /* ── WORD COUNT ── */
    #wordcount {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-left: auto;
      padding-right: 4px;
    }
  </style>
</head>
<body>
 
<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">
    <span></span>
    Portify
  </div>
  
  <!-- Navigation Links -->
  <nav class="topbar-nav">
    <a href="frontend.html" class="nav-btn active">Editor</a>
    <a href="templates.html" class="nav-btn">Templates</a>
    <a href="about.html" class="nav-btn">About</a>
  </nav>
 
  <div class="spacer"></div>
 
  <!-- Copy Code & Theme Controls -->
  <button class="btn btn-secondary" id="btn-copy-code" title="Copy Compiled HTML Source Code">
    <span class="btn-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </span>
    Copy Code
  </button>
  
  <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
    <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
  </button>
  
  <div class="topbar-meta"><span class="status-dot"></span>Ready</div>
</div>
 
<!-- WORKSPACE -->
<div id="workspace">
 
  <!-- EDITOR PANE -->
  <div id="editor-pane">
    <div class="pane-header">
      <div class="pane-dot active"></div>
      <span class="pane-label">Editor</span>
      <span id="wordcount">0 words</span>
    </div>
    <div id="editor-body">
      <div id="line-numbers"></div>
      <textarea id="editor" spellcheck="false" placeholder="# Start writing your portfolio..."></textarea>
    </div>
  </div>
 
  <!-- RESIZE DIVIDER -->
  <div id="divider"></div>
 
  <!-- PREVIEW PANE -->
  <div id="preview-pane">
    <div id="preview-header">
      <div class="pane-dot"></div>
      <span class="pane-label">Preview</span>
      <div class="spacer"></div>
 
      <!-- SERVER BUTTONS -->
      <button class="btn btn-primary" id="btn-run" title="Run and Preview">
        <span class="btn-icon">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2v10l10-5-10-5z" fill="currentColor"/>
          </svg>
        </span>
        Run
      </button>
      <button class="btn btn-secondary" id="btn-generate" title="Generate Portfolio">
        <span class="btn-icon">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="12" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="1" y="8" width="12" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="11.5" cy="3.5" r="1" fill="currentColor"/>
            <circle cx="11.5" cy="10.5" r="1" fill="currentColor"/>
          </svg>
        </span>
        Generate
      </button>
    </div>
 
    <iframe id="preview-iframe"></iframe>
  </div>
</div>
 
<!-- TOAST -->
<div id="toast"></div>
 
<script>
window.addEventListener('DOMContentLoaded', () => {
  // ─── ELEMENTS ───────────────────────────────
  const editor       = document.getElementById('editor');
  const lineNumbers  = document.getElementById('line-numbers');
  const wordcountEl  = document.getElementById('wordcount');
  const divider      = document.getElementById('divider');
  const editorPane   = document.getElementById('editor-pane');
  const workspace    = document.getElementById('workspace');
  const previewIframe = document.getElementById('preview-iframe');
  const previewDot   = document.querySelector('#preview-pane .pane-dot');
  const toast        = document.getElementById('toast');
  const themeToggleBtn = document.getElementById('theme-toggle');
 
  // ─── DEFAULT CONTENT ────────────────────────
  const defaultMD = `<!-- 
    Instructions:
    - Edit the text in just the square brackets.
    - For links, paste the url in the round brackets.
    - To add more projects, just copy paste the 5 lines.
    - If you can't see your desired output, try reloading the website or check the structure of md.
 -->

# PROFILE

Name: [Your Full Name]<br>
Title: [Your Professional Title, e.g., Software Engineer]<br>
Bio: [Write a short introduction about yourself, your background, and your goals.]<br>

> "[Insert a personal quote, philosophy, or objective statement.]"

# SKILLS
* Languages: [List your programming languages, e.g., C++, Java, Python]
* Tools: [List your tools, e.g., Git, VS Code, Linux]
* Concepts: [List key concepts, e.g., OOP, Data Structures, Web Development]

# PROJECTS

## [Project Title 1]
Title: [Title of your project.]<br>
Description: [Brief description of what the project does and your role in it.]<br>
Tech: [Languages, tools, or concepts used, e.g., C++, OOP]<br>
Link: [View Source Code](paste_actual_link_in_these_brackets)

## [Project Title 2]
Title: [Title of your project.]<br>
Description: [Brief description of what the project does and your role in it.]<br>
Tech: [Languages, tools, or concepts used, e.g., C++, OOP]<br>
Link: [View Source Code](paste_actual_link_in_these_brackets)

# CONTACT
Email: [your.email@example.com](mailto:your.email@example.com)<br>
GitHub: [github.com/yourusername](https://github.com/yourusername)<br>
LinkedIn: [linkedin.com/in/yourusername](https://linkedin.com/in/yourusername)

`;
 
  // ─── INIT ───────────────────────────────────
  editor.value = defaultMD;
  updateLineNumbers();
  updateWordCount();
 
  // ─── LINE NUMBERS ────────────────────────────
  function updateLineNumbers() {
    const lines = editor.value.split('\n').length;
    lineNumbers.innerText = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
    lineNumbers.scrollTop = editor.scrollTop;
  }

  editor.addEventListener('input', () => {
    updateLineNumbers();
    updateWordCount();
    // Optional: mark preview as outdated
    previewDot.classList.remove('active');
  });

  editor.addEventListener('scroll', () => {
    lineNumbers.scrollTop = editor.scrollTop;
  });

  // ─── WORD COUNT ─────────────────────────────
  function updateWordCount() {
    const words = editor.value.trim().split(/\s+/).filter(Boolean).length;
    wordcountEl.textContent = words + ' word' + (words !== 1 ? 's' : '');
  }

  // ─── TAB KEY SUPPORT ────────────────────────
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
      updateLineNumbers();
    }
  });

  // ─── RUN BUTTON ──────────────────────────────
  const btnRun = document.getElementById('btn-run');
  const btnGenerate = document.getElementById('btn-generate');
  
  btnRun.addEventListener('click', () => {
    const markdown = editor.value;
    const templateId = localStorage.getItem('selected_template') || '1';
    
    showToast('Running...', 2000);
    
    fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown, template: templateId })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showToast('✓ Preview updated', 2000);
        previewDot.classList.add('active'); // mark as current
        const timestamp = new Date().getTime();
        previewIframe.src = `/output/index.html?t=${timestamp}`;
      } else {
        showToast('✗ ' + (data.message || 'Run failed'), 2000);
      }
    })
    .catch(err => {
      showToast('✗ Cannot reach server — is server.py running?', 2000);
      console.error('Fetch error:', err);
    });
  });
  
  // ─── GENERATE BUTTON ─────────────────────────
  btnGenerate.addEventListener('click', () => {
    const markdown = editor.value;
    const templateId = localStorage.getItem('selected_template') || '1';
    
    showToast('Generating...', 2000);
    
    fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown, template: templateId })
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showToast('✓ Opening in new tab...', 2000);
        // Open in new tab with cache-busting timestamp
        const timestamp = new Date().getTime();
        window.open(`/output/index.html?t=${timestamp}`, '_blank');
      } else {
        showToast('✗ ' + (data.message || 'Generation failed'), 2000);
      }
    })
    .catch(err => {
      showToast('✗ Cannot reach server — is server.py running?', 2000);
      console.error('Fetch error:', err);
    });
  });
 
  // ─── TOAST ───────────────────────────────────
  let toastTimer;
  function showToast(msg, duration = 2000) {
    clearTimeout(toastTimer);
    
    toast.textContent = msg;
    toast.classList.add('show');
    
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, duration);
  }
 
  // ─── COPY CODE BUTTON AND MODAL ─────────────────────────
  const btnCopyCode = document.getElementById('btn-copy-code');
  const codeModal = document.getElementById('code-modal');
  const modalCloseIcon = document.getElementById('modal-close-icon');
  const btnModalClose = document.getElementById('btn-modal-close');
  const modalCodeArea = document.getElementById('modal-code-area');
  const btnCopyClipboard = document.getElementById('btn-copy-clipboard');

  btnCopyCode.addEventListener('click', () => {
    showToast('Loading code...', 1000);
    
    // Fetch the index.html from server
    const host = window.location.origin;
    const timestamp = new Date().getTime();
    fetch(`${host}/output/index.html?t=${timestamp}`)
      .then(response => {
        if (!response.ok) {
          throw new Error('Code has not been run/generated yet, or server error.');
        }
        return response.text();
      })
      .then(htmlText => {
        modalCodeArea.value = htmlText;
        codeModal.classList.add('show');
      })
      .catch(err => {
        showToast('✗ Run or Generate your portfolio first!', 3000);
        console.error('Fetch error:', err);
      });
  });

  // Modal close handlers
  function closeModal() {
    codeModal.classList.remove('show');
  }

  modalCloseIcon.addEventListener('click', closeModal);
  btnModalClose.addEventListener('click', closeModal);
  codeModal.addEventListener('click', (e) => {
    if (e.target === codeModal) closeModal();
  });

  // Copy to clipboard handler
  btnCopyClipboard.addEventListener('click', () => {
    modalCodeArea.select();
    modalCodeArea.setSelectionRange(0, 99999); /* For mobile devices */

    navigator.clipboard.writeText(modalCodeArea.value)
      .then(() => {
        const originalText = btnCopyClipboard.innerHTML;
        btnCopyClipboard.innerHTML = '✓ Copied!';
        showToast('✓ Copied to clipboard', 2000);
        setTimeout(() => {
          btnCopyClipboard.innerHTML = originalText;
        }, 2000);
      })
      .catch(err => {
        showToast('✗ Failed to copy', 2000);
        console.error('Clipboard copy error:', err);
      });
  });

  // ─── THEME TOGGLE ────────────────────────────
  themeToggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    localStorage.setItem('portify-theme', isLight ? 'light' : 'dark');
    if (isLight) {
      document.documentElement.classList.add('light-theme');
    } else {
      document.documentElement.classList.remove('light-theme');
    }
  });

  // ─── DIVIDER DRAG ────────────────────────────
  let dragging = false;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    
    // Prevent the iframe from swallowing mouse events
    previewIframe.style.pointerEvents = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const wsRect = workspace.getBoundingClientRect();
    const newEditorW = Math.max(200, Math.min(wsRect.width - 200, e.clientX - wsRect.left));
    editorPane.style.width = newEditorW + 'px';
    editorPane.style.flex = 'none';
  });

  document.addEventListener('mouseup', e => {
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    
    // Restore iframe interaction
    previewIframe.style.pointerEvents = '';
  });
});
</script>

<!-- CODE PREVIEW MODAL -->
<div id="code-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Compiled Portfolio Source Code</h3>
      <button class="modal-close-btn" id="modal-close-icon">&times;</button>
    </div>
    <div class="modal-body">
      <textarea id="modal-code-area" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btn-copy-clipboard">
        <span class="btn-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </span>
        Copy to Clipboard
      </button>
      <button class="btn btn-secondary" id="btn-modal-close">Close</button>
    </div>
  </div>
</div>

</body>
</html>
