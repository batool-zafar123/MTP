<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME] // SECURE_NODE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0914; color: #ffffff; font-family: 'DM Mono', monospace; padding: 50px 20px; }
    .terminal-container { max-width: 900px; margin: 0 auto; border: 4px solid #000; background: #121020; box-shadow: 12px 12px 0px #000; padding: 40px; position: relative; }
    .grid-lines { position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 32, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 6px 100%; pointer-events: none; }
    
    header { border-bottom: 4px solid #000; padding-bottom: 30px; margin-bottom: 40px; }
    h1 { font-size: 3rem; color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); text-transform: uppercase; margin-bottom: 10px; }
    .title-tag { color: #ff0055; font-size: 1.2rem; font-weight: bold; border: 2px solid #ff0055; display: inline-block; padding: 4px 12px; margin-bottom: 20px; }
    blockquote { border: 2px solid #000; background: #0b0914; padding: 20px; box-shadow: 6px 6px 0px #ff0055; margin: 24px 0; color: #ff0055; }
    
    .section-title { font-size: 1.8rem; color: #ff0055; text-transform: uppercase; margin-bottom: 24px; border-bottom: 2px solid #000; padding-bottom: 8px; }
    
    .skill-item { background: #0b0914; border: 3px solid #000; padding: 15px; margin-bottom: 12px; box-shadow: 4px 4px 0 #00ffcc; display: flex; flex-direction: column; }
    .skill-label { color: #00ffcc; text-transform: uppercase; font-size: 0.85rem; }
    .skill-content { color: #ffffff; margin-top: 4px; }
    
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .project-card { background: #0b0914; border: 3px solid #000; padding: 24px; box-shadow: 6px 6px 0px #000; transition: all 0.2s; }
    .project-card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #00ffcc; }
    .project-title { font-size: 1.3rem; margin-bottom: 10px; color: #00ffcc; }
    .project-tech { color: #ff0055; font-size: 0.8rem; margin: 10px 0; }
    .project-link { color: #ffffff; text-decoration: none; border: 2px solid #ffffff; padding: 4px 10px; display: inline-block; font-size: 0.8rem; text-align: center; }
    .project-link:hover { background: #ffffff; color: #0b0914; }
    
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link { background: #0b0914; border: 3px solid #000; padding: 16px; color: #ffffff; text-decoration: none; display: flex; justify-content: space-between; box-shadow: 4px 4px 0 #ff0055; }
    .contact-link:hover { color: #00ffcc; box-shadow: 4px 4px 0 #00ffcc; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="terminal-container">
    <div class="grid-lines"></div>
    <header>
      <h1>[PROFILE_NAME]</h1>
      <div class="title-tag">[PROFILE_TITLE]</div>
      <p style="font-size: 1rem; color: #a19fc9;">[PROFILE_BIO]</p>
      [PROFILE_QUOTE]
    </header>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px;">
      <div>
        <h2 class="section-title">// SYSTEM_STATS</h2>
        <div class="skills-list">
          [SKILLS_CONTENT]
        </div>
      </div>
      <div>
        <h2 class="section-title">// CONTACTS</h2>
        <div class="contact-links">
          [CONTACT_CONTENT]
        </div>
      </div>
    </div>

    <h2 class="section-title">// REPO_REGISTRY</h2>
    <div class="projects-grid">
      [PROJECTS_CONTENT]
    </div>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
