<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #121212; color: #ffffff; font-family: 'DM Sans', sans-serif; overflow-y: hidden; }
    .horizontal-scroll-container { display: flex; flex-wrap: nowrap; overflow-x: auto; width: 100vw; height: 100vh; scroll-snap-type: x mandatory; }
    
    section { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; padding: 100px 80px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #222; }
    
    h1 { font-family: 'Syne', sans-serif; font-size: 4rem; text-transform: uppercase; margin-bottom: 12px; line-height: 1; }
    .subtitle { color: #e5ff00; font-family: 'Syne', sans-serif; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 24px; }
    .bio { max-width: 600px; color: #aaa; font-size: 1.1rem; line-height: 1.6; }
    blockquote { border-left: 4px solid #e5ff00; padding-left: 20px; font-style: italic; margin-top: 20px; max-width: 500px; font-size: 1.2rem; }
    
    .section-title { font-family: 'Syne', sans-serif; font-size: 2.2rem; text-transform: uppercase; color: #e5ff00; margin-bottom: 40px; }
    
    .skills-wrapper { display: flex; flex-direction: column; gap: 20px; max-width: 600px; }
    .skill-item { border-bottom: 1px solid #333; padding-bottom: 12px; }
    .skill-label { font-family: 'Syne', sans-serif; text-transform: uppercase; color: #e5ff00; font-weight: bold; }
    
    .projects-wrapper { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; width: 100%; }
    .project-card { flex: 0 0 350px; background: #1f1f1f; padding: 30px; border-radius: 8px; border: 1px solid #333; }
    .project-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; margin-bottom: 10px; }
    .project-desc { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
    .project-tech { font-family: monospace; color: #e5ff00; font-size: 0.8rem; }
    .project-link { text-decoration: none; color: #ffffff; font-weight: bold; border-bottom: 1px solid #e5ff00; display: inline-block; margin-top: 12px; }

    .contact-wrapper { display: flex; flex-direction: column; gap: 16px; max-width: 500px; }
    .contact-link { text-decoration: none; color: #ffffff; border: 1px solid #333; padding: 16px; display: flex; justify-content: space-between; border-radius: 6px; }
    .contact-link:hover { border-color: #e5ff00; }
    .contact-label { color: #e5ff00; font-weight: bold; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="horizontal-scroll-container">
    <section id="hero">
      <h1>[PROFILE_NAME]</h1>
      <div class="subtitle">[PROFILE_TITLE]</div>
      <p class="bio">[PROFILE_BIO]</p>
      [PROFILE_QUOTE]
    </section>

    <section id="skills">
      <h2 class="section-title">Capabilities</h2>
      <div class="skills-wrapper">
        [SKILLS_CONTENT]
      </div>
    </section>

    <section id="projects" style="flex: 0 0 120vw;">
      <h2 class="section-title">Projects Built</h2>
      <div class="projects-wrapper">
        [PROJECTS_CONTENT]
      </div>
    </section>

    <section id="contact">
      <h2 class="section-title">Get In Touch</h2>
      <div class="contact-wrapper">
        [CONTACT_CONTENT]
      </div>
    </section>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
