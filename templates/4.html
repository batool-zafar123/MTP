<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: radial-gradient(circle at center, #1b1e22 0%, #060708 100%); color: #f3f4f6; font-family: 'Georgia', serif; line-height: 1.7; padding: 100px 20px; }
    .container { max-width: 800px; margin: 0 auto; text-align: center; }
    h1 { font-size: 3.5rem; font-weight: 300; letter-spacing: 0.1em; color: #ffffff; text-transform: uppercase; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .title-tag { font-size: 1rem; font-style: italic; color: #b8860b; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 40px; }
    .bio { font-size: 1.15rem; line-height: 1.8; color: #a3a9b0; margin-bottom: 40px; text-align: justify; text-align-last: center; }
    blockquote { font-size: 1.4rem; color: #ffffff; border-top: 1px solid rgba(184, 134, 11, 0.3); border-bottom: 1px solid rgba(184, 134, 11, 0.3); padding: 24px 0; margin: 40px 0; font-style: italic; }
    
    .section-title { font-size: 1.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; margin: 60px 0 30px 0; position: relative; }
    .section-title::after { content: ''; display: block; width: 40px; height: 1px; background: #b8860b; margin: 10px auto 0 auto; }
    
    .skills-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: left; }
    .skill-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 4px; }
    .skill-label { color: #b8860b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
    
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; text-align: left; }
    .project-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 32px; border-radius: 6px; transition: all 0.3s; }
    .project-card:hover { border-color: #b8860b; background: rgba(255,255,255,0.04); }
    .project-title { font-size: 1.25rem; font-weight: normal; margin-bottom: 12px; color: #ffffff; }
    .project-desc { color: #a3a9b0; font-size: 0.9rem; margin-bottom: 16px; font-family: sans-serif; }
    .project-tech { color: #b8860b; font-size: 0.75rem; font-family: monospace; }
    .project-link { color: #ffffff; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; margin-top: 16px; border-bottom: 1px solid rgba(255,255,255,0.3); }
    .project-link:hover { border-color: #ffffff; }
    
    .contact-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
    .contact-link { text-decoration: none; color: #a3a9b0; border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 4px; transition: all 0.3s; }
    .contact-link:hover { border-color: #b8860b; color: #ffffff; background: rgba(184, 134, 11, 0.05); }
    .contact-label { display: none; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>[PROFILE_NAME]</h1>
      <div class="title-tag">[PROFILE_TITLE]</div>
      <div class="bio">[PROFILE_BIO]</div>
      [PROFILE_QUOTE]
    </header>

    <h2 class="section-title">Areas of Study</h2>
    <div class="skills-list">
      [SKILLS_CONTENT]
    </div>

    <h2 class="section-title">Selected Works</h2>
    <div class="projects-grid">
      [PROJECTS_CONTENT]
    </div>

    <h2 class="section-title">Get In Touch</h2>
    <div class="contact-links">
      [CONTACT_CONTENT]
    </div>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
