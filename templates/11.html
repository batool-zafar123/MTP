<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f8fafc; font-family: 'DM Sans', sans-serif; padding: 80px 20px; }
    .timeline-container { max-width: 800px; margin: 0 auto; position: relative; }
    .timeline-container::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #3b82f6; }
    
    .timeline-section { position: relative; margin-bottom: 50px; padding-left: 50px; }
    .timeline-marker { position: absolute; left: 11px; top: 5px; width: 20px; height: 20px; border-radius: 50%; background: #0f172a; border: 4px solid #3b82f6; z-index: 2; }
    
    h1 { font-family: 'Syne', sans-serif; font-size: 2.8rem; margin-bottom: 8px; }
    .role-title { color: #3b82f6; font-weight: bold; margin-bottom: 20px; }
    blockquote { font-style: italic; color: #94a3b8; border-left: 3px solid #3b82f6; padding-left: 15px; margin: 20px 0; }
    
    .card { background: #1e293b; border-radius: 8px; padding: 24px; border-left: 4px solid #3b82f6; }
    
    .skill-item { display: inline-block; background: #1e293b; border: 1px solid #3b82f6; border-radius: 20px; padding: 8px 16px; margin: 6px; }
    .skill-label { font-weight: bold; color: #3b82f6; margin-right: 6px; }
    
    .projects-grid { display: flex; flex-direction: column; gap: 20px; }
    .project-card { background: #1e293b; padding: 24px; border-radius: 8px; border: 1px solid #334155; }
    .project-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; margin-bottom: 8px; }
    .project-desc { color: #94a3b8; margin-bottom: 12px; }
    .project-tech { font-family: monospace; color: #3b82f6; }
    .project-link { text-decoration: none; color: #ffffff; font-weight: bold; border-bottom: 1px solid #3b82f6; display: inline-block; margin-top: 10px; }

    .contact-links { display: flex; flex-direction: column; gap: 10px; }
    .contact-link { text-decoration: none; color: #ffffff; border: 1px solid #334155; padding: 12px; display: flex; justify-content: space-between; border-radius: 6px; }
    .contact-label { color: #3b82f6; font-weight: bold; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="timeline-container">
    <div class="timeline-section">
      <div class="timeline-marker"></div>
      <div class="card">
        <h1>[PROFILE_NAME]</h1>
        <div class="role-title">[PROFILE_TITLE]</div>
        <p style="color:#94a3b8; line-height: 1.6;">[PROFILE_BIO]</p>
        [PROFILE_QUOTE]
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-marker"></div>
      <h2 style="font-family:'Syne'; margin-bottom:20px;">Skills & Competence</h2>
      <div class="skills-list">
        [SKILLS_CONTENT]
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-marker"></div>
      <h2 style="font-family:'Syne'; margin-bottom:20px;">Built Timeline</h2>
      <div class="projects-grid">
        [PROJECTS_CONTENT]
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-marker"></div>
      <h2 style="font-family:'Syne'; margin-bottom:20px;">Correspondence</h2>
      <div class="contact-links">
        [CONTACT_CONTENT]
      </div>
    </div>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
