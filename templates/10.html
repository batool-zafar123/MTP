<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e0e0e0; color: #333333; font-family: 'DM Sans', sans-serif; padding: 60px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    
    .neumorphic-panel { background: #e0e0e0; border-radius: 20px; box-shadow: 9px 9px 16px #bebebe, -9px -9px 16px #ffffff; padding: 40px; margin-bottom: 40px; }
    .neumorphic-inset { background: #e0e0e0; border-radius: 12px; box-shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; padding: 24px; margin: 20px 0; }
    
    h1 { font-size: 2.8rem; font-weight: 700; color: #222222; margin-bottom: 8px; }
    .title-role { font-size: 1.1rem; color: #666; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    
    blockquote { font-style: italic; color: #555; border-left: 3px solid #888; padding-left: 15px; margin: 20px 0; }
    
    .section-title { font-size: 1.5rem; font-weight: 700; color: #222222; margin: 40px 0 20px 0; }
    
    .skill-item { background: #e0e0e0; border-radius: 10px; box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; padding: 16px 24px; margin-bottom: 16px; display: flex; justify-content: space-between; }
    .skill-label { font-weight: bold; color: #222222; }
    
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .project-card { background: #e0e0e0; border-radius: 14px; box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff; padding: 24px; display: flex; flex-direction: column; }
    .project-title { font-size: 1.2rem; color: #222222; margin-bottom: 8px; }
    .project-desc { color: #555555; font-size: 0.9rem; margin-bottom: 16px; }
    .project-tech { font-family: monospace; font-size: 0.8rem; font-weight: bold; color: #666; }
    .project-link { text-decoration: none; color: #222; font-weight: bold; border-radius: 8px; padding: 8px 16px; background: #e0e0e0; box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff; margin-top: auto; display: inline-block; width: max-content; }
    .project-link:active { box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }

    .contact-links { display: flex; flex-direction: column; gap: 16px; }
    .contact-link { text-decoration: none; color: #333333; background: #e0e0e0; border-radius: 10px; box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; padding: 16px; display: flex; justify-content: space-between; }
    .contact-link:active { box-shadow: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff; }
    .contact-label { font-weight: bold; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="neumorphic-panel">
      <h1>[PROFILE_NAME]</h1>
      <div class="title-role">[PROFILE_TITLE]</div>
      <div class="neumorphic-inset">
        <p style="line-height: 1.6;">[PROFILE_BIO]</p>
      </div>
      [PROFILE_QUOTE]
    </div>

    <h2 class="section-title">System Attributes</h2>
    [SKILLS_CONTENT]

    <h2 class="section-title">Selected Projects</h2>
    <div class="projects-grid">
      [PROJECTS_CONTENT]
    </div>

    <h2 class="section-title">Contact Information</h2>
    <div class="contact-links">
      [CONTACT_CONTENT]
    </div>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
