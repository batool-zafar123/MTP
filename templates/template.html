<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME] - Portfolio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --surface2:  #1a1e25;
      --border:    #252a34;
      --accent:    #c8f04e;
      --accent2:   #4ef0c8;
      --text:      #e8eaf0;
      --text-muted:#6b7280;
      --danger:    #f04e6b;
      
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html {
      scroll-behavior: smooth;
      /* Vital for the top bar covering the page at small resolutions */
      scroll-padding-top: 60px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 40px 0;
      transition: width 0.3s ease;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 100;
    }
    
    .sidebar::-webkit-scrollbar { width: 5px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-logo {
      font-family: var(--font-ui);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      padding: 0 24px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .sidebar-logo:hover {
      transform: translateY(-2px);
    }

    .sidebar-logo svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.2s;
      white-space: nowrap;
      border-right: 3px solid transparent;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--accent);
      background: rgba(200, 240, 78, 0.05);
      border-right: 3px solid var(--accent);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .nav-group {
      margin-bottom: 10px;
    }

    .nav-sublinks {
      display: flex;
      flex-direction: column;
      padding-left: 56px;
      padding-right: 24px;
      margin-top: 5px;
      gap: 8px;
    }

    .nav-sublink {
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .nav-sublink:hover {
      color: var(--accent2);
    }

    /* ── MAIN CONTENT ── */
    .content-wrapper {
      margin-left: 260px;
      width: calc(100% - 260px);
      flex: 1;
      min-height: 100vh;
      transition: margin 0.3s ease, width 0.3s ease;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    /* ── TYPOGRAPHY ── */
    h1, h2, h3, h4 {
      font-family: var(--font-ui);
      color: var(--text);
      font-weight: 700;
    }

    /* ── SECTIONS (WITH DIVIDERS) ── */
    section {
      margin-bottom: 80px;
      padding-bottom: 60px;
      border-bottom: 1px solid var(--border);
    }
    
    section:last-of-type {
      border-bottom: none;
      margin-bottom: 20px;
    }

    /* ── HEADER / HERO ── */
    h1 {
      font-size: 3.5rem;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
      line-height: 1.1;
    }

    .title {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 1.15rem;
      margin-bottom: 32px;
      display: inline-block;
      padding: 6px 12px;
      background: rgba(200, 240, 78, 0.1);
      border-radius: 6px;
    }

    .bio {
      color: var(--text-muted);
      font-size: 1.2rem;
      max-width: 700px;
      margin-bottom: 30px;
    }

    blockquote {
      border-left: 4px solid var(--accent2);
      margin: 30px 0;
      font-size: 1.25rem;
      font-style: italic;
      color: var(--text);
      background: var(--surface);
      padding: 24px 30px;
      border-radius: 0 12px 12px 0;
    }

    .section-title {
      font-size: 2rem;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(200, 240, 78, 0.3);
    }

    /* ── SKILLS ── */
    .skills-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skill-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      border-radius: 10px;
      font-family: var(--font-mono);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.25s ease;
    }

    .skill-item:hover {
      transform: translateX(6px);
      border-color: var(--accent);
      background: var(--surface2);
    }

    .skill-label {
      color: var(--accent2);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .skill-content {
      color: var(--text);
      font-size: 1rem;
    }

    /* ── PROJECTS ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .project-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .project-title {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--text);
    }

    .project-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      flex-grow: 1;
    }

    .project-tech {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent2);
      margin-bottom: 24px;
      padding: 8px 12px;
      background: rgba(78, 240, 200, 0.1);
      border-radius: 6px;
      display: inline-block;
      line-height: 1.4;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.2s;
      margin-top: auto;
    }

    .project-link:hover {
      color: var(--text);
    }

    .project-link::after {
      content: '→';
      transition: transform 0.2s;
    }

    .project-link:hover::after {
      transform: translateX(4px);
    }

    /* ── CONTACT ── */
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .contact-link:hover {
      background: var(--surface2);
      border-color: var(--accent2);
      transform: translateY(-3px);
    }

    .contact-label {
      font-family: var(--font-ui);
      font-weight: 700;
      color: var(--accent2);
      min-width: 90px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.95rem;
    }

    .contact-val {
      font-family: var(--font-mono);
      color: var(--text);
      transition: color 0.2s;
    }
    
    .contact-link:hover .contact-val {
      color: var(--accent);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidebar {
        width: 70px;
        padding-top: 20px;
      }
      .content-wrapper {
        margin-left: 70px;
        width: calc(100% - 70px);
      }
      .sidebar-text, .nav-sublinks, .sidebar-logo span {
        display: none;
      }
      .nav-link {
        padding: 14px;
        justify-content: center;
      }
      .nav-link:hover, .nav-link.active {
        border-right: none;
        background: transparent;
      }
      .nav-link:hover svg, .nav-link.active svg {
        color: var(--accent);
      }
      .sidebar-logo {
        padding: 0;
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: 60px;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 0;
        align-items: center;
        justify-content: space-around;
        position: fixed;
        z-index: 100;
        background: var(--surface);
      }
      .content-wrapper {
        margin-left: 0;
        margin-top: 60px;
        width: 100%;
      }
      .container { padding: 40px 20px; }
      h1 { font-size: 2.5rem; }
      .section-title { font-size: 1.6rem; }
      .contact-link { flex-direction: column; align-items: flex-start; gap: 8px; }
      .sidebar-logo { display: none; }
      .nav-group { margin: 0; display: flex; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR NAVIGATION -->
  <nav class="sidebar">
    <!-- Clickable logo scrolling to top -->
    <a href="#" class="sidebar-logo" title="Back to Top">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      <span>My Portfolio</span>
    </a>

    <a href="#hero" class="nav-link">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="sidebar-text">[PROFILE_NAME]</span>
    </a>

    <a href="#skills" class="nav-link">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
      <span class="sidebar-text">Skills & Expertise</span>
    </a>

    <div class="nav-group">
      <a href="#projects" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span class="sidebar-text">Featured Work</span>
      </a>
      <div class="nav-sublinks">
        <!-- C++ should inject items like: <a href="#pro-1" class="nav-sublink">Project Name</a> -->
        [SIDEBAR_PROJECTS_LIST]
      </div>
    </div>

    <a href="#contact" class="nav-link">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
      <span class="sidebar-text">Get In Contact</span>
    </a>
  </nav>

  <!-- MAIN SCROLLABLE CONTENT -->
  <main class="content-wrapper">
    <div class="container">
      
      <!-- HEADER / PROFILE -->
      <section id="hero">
        <h1>[PROFILE_NAME]</h1>
        <div class="title">[PROFILE_TITLE]</div>
        <p class="bio">[PROFILE_BIO]</p>
        [PROFILE_QUOTE]
      </section>

      <!-- SKILLS -->
      <section id="skills">
        <h2 class="section-title">Skills & Expertise</h2>
        <div class="skills-list">
          [SKILLS_CONTENT]
        </div>
      </section>

      <!-- PROJECTS -->
      <section id="projects">
        <h2 class="section-title">Featured Work</h2>
        <div class="projects-grid">
          [PROJECTS_CONTENT]
        </div>
      </section>

      <!-- CONTACT -->
      <section id="contact">
        <h2 class="section-title">Get In Contact</h2>
        <div class="contact-links">
          [CONTACT_CONTENT]
        </div>
      </section>

    </div>
  </main>

  <script>
    // Smooth scrolling & active link highlighting
    const sections = document.querySelectorAll('section');
    const navLinks = document.querySelectorAll('nav .nav-link');

    window.addEventListener('scroll', () => {
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        // Check window scroll position vs section position
        if (window.scrollY >= sectionTop - 150) {
          current = section.getAttribute('id');
        }
      });

      navLinks.forEach(link => {
        link.classList.remove('active');
        if (current && link.getAttribute('href').includes(current)) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
