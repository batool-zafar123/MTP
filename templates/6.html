<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0d0c; color: #f5f2eb; font-family: 'Inter', sans-serif; padding: 80px 20px; }
    .wrapper { max-width: 1000px; margin: 0 auto; }
    h1 { font-family: 'Syne', sans-serif; font-size: 7.5vw; line-height: 0.9; text-transform: uppercase; font-weight: 900; margin-bottom: 24px; -webkit-text-stroke: 1.5px #f5f2eb; color: transparent; transition: color 0.3s; }
    h1:hover { color: #f5f2eb; }
    .hero-title { font-family: 'Syne', sans-serif; font-size: 2rem; color: #e65c00; text-transform: uppercase; margin-bottom: 30px; }
    .desc { font-size: 1.3rem; line-height: 1.6; max-width: 800px; margin-bottom: 40px; font-weight: 300; }
    blockquote { font-family: 'Syne', sans-serif; font-size: 1.6rem; text-transform: uppercase; border-left: 6px solid #e65c00; padding-left: 20px; margin: 40px 0; color: #e65c00; }
    
    .section-title { font-family: 'Syne', sans-serif; font-size: 3rem; text-transform: uppercase; color: #f5f2eb; margin: 80px 0 30px 0; border-bottom: 3px solid #e65c00; padding-bottom: 10px; }
    
    .skill-item { display: flex; flex-direction: column; margin-bottom: 20px; }
    .skill-label { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-transform: uppercase; color: #e65c00; }
    .skill-content { font-size: 1.1rem; color: #f5f2eb; font-weight: 300; }
    
    .projects-grid { display: flex; flex-direction: column; gap: 40px; }
    .project-card { border-bottom: 1px solid rgba(245,242,235,0.1); padding-bottom: 30px; }
    .project-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 10px; }
    .project-desc { color: #aaa; margin-bottom: 15px; font-size: 1rem; }
    .project-tech { font-family: monospace; color: #e65c00; }
    .project-link { text-decoration: none; color: #f5f2eb; font-weight: bold; background: #e65c00; padding: 8px 18px; display: inline-block; margin-top: 15px; text-transform: uppercase; font-size: 0.8rem; }
    
    .contact-links { display: flex; flex-direction: column; gap: 15px; }
    .contact-link { text-decoration: none; color: #f5f2eb; font-size: 1.3rem; font-family: 'Syne', sans-serif; text-transform: uppercase; display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(245,242,235,0.2); padding-bottom: 10px; }
    .contact-link:hover { color: #e65c00; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>[PROFILE_NAME]</h1>
      <div class="hero-title">[PROFILE_TITLE]</div>
      <p class="desc">[PROFILE_BIO]</p>
      [PROFILE_QUOTE]
    </header>

    <h2 class="section-title">Core Capability</h2>
    <div>
      [SKILLS_CONTENT]
    </div>

    <h2 class="section-title">Built Systems</h2>
    <div class="projects-grid">
      [PROJECTS_CONTENT]
    </div>

    <h2 class="section-title">Communications</h2>
    <div class="contact-links">
      [CONTACT_CONTENT]
    </div>
  </div>
  
  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
