<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[PROFILE_NAME]</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0c14; color: #ffffff; font-family: 'DM Sans', sans-serif; padding: 80px 20px; overflow-x: hidden; position: relative; min-height: 100vh; }
    
    .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; z-index: 1; }
    .blob1 { width: 300px; height: 300px; background: #8b5cf6; top: 10%; left: 10%; }
    .blob2 { width: 400px; height: 400px; background: #ec4899; bottom: 10%; right: 10%; }
    
    .container { max-width: 850px; margin: 0 auto; position: relative; z-index: 2; }
    
    .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 36px; margin-bottom: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
    
    h1 { font-family: 'Syne', sans-serif; font-size: 3.2rem; line-height: 1.1; margin-bottom: 8px; }
    .role-title { font-family: 'Syne', sans-serif; color: #ec4899; font-size: 1.15rem; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em; }
    blockquote { font-style: italic; color: #cbd5e1; border-left: 4px solid #8b5cf6; padding-left: 16px; margin: 24px 0; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 0 10px 10px 0; }
    
    .section-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; margin-bottom: 24px; }
    
    .skill-item { display: flex; flex-direction: column; margin-bottom: 16px; }
    .skill-label { font-weight: bold; color: #ec4899; }
    .skill-content { color: #94a3b8; }
    
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
    .project-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 24px; }
    .project-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; margin-bottom: 8px; }
    .project-desc { color: #cbd5e1; font-size: 0.9rem; margin-bottom: 16px; }
    .project-tech { font-family: monospace; color: #8b5cf6; font-size: 0.8rem; }
    .project-link { text-decoration: none; color: #ffffff; font-weight: bold; border-bottom: 1px solid #ec4899; display: inline-block; margin-top: 12px; }

    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link { text-decoration: none; color: #ffffff; border: 1px solid rgba(255,255,255,0.05); padding: 14px; display: flex; justify-content: space-between; border-radius: 8px; background: rgba(255,255,255,0.01); }
    .contact-link:hover { border-color: #8b5cf6; background: rgba(255,255,255,0.03); }
    .contact-label { color: #ec4899; font-weight: bold; }
    
    .hidden-data { display: none; }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  
  <div class="container">
    <div class="glass-card">
      <h1>[PROFILE_NAME]</h1>
      <div class="role-title">[PROFILE_TITLE]</div>
      <p style="color:#cbd5e1; line-height: 1.6;">[PROFILE_BIO]</p>
      [PROFILE_QUOTE]
    </div>

    <div class="glass-card">
      <h2 class="section-title">Capabilities</h2>
      [SKILLS_CONTENT]
    </div>

    <div class="glass-card">
      <h2 class="section-title">Featured Developments</h2>
      <div class="projects-grid">
        [PROJECTS_CONTENT]
      </div>
    </div>

    <div class="glass-card">
      <h2 class="section-title">Contact</h2>
      <div class="contact-links">
        [CONTACT_CONTENT]
      </div>
    </div>
  </div>

  <div class="hidden-data">
    [SIDEBAR_PROJECTS_LIST]
  </div>
</body>
</html>
